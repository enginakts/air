# Çelik Kubbe / hareketli/durağan hedef: GMC kapalı (CPU/FPS), uzun tampon, gevşek eşleştirme (balon üstü takip).
# Ultralytics BoT-SORT — https://docs.ultralytics.com/modes/track/

tracker_type: botsort
# Elde nesne / kısa örtülme: biraz daha düşük yüksek eşik + daha uzun tampon + gevşek IoU eşleştirme
track_high_thresh: 0.20
track_low_thresh: 0.06
new_track_thresh: 0.20
track_buffer: 72
match_thresh: 0.66
fuse_score: true

gmc_method: none

proximity_thresh: 0.45
appearance_thresh: 0.75
with_reid: false
model: auto
